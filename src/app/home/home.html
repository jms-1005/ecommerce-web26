<div class="banner"></div>

<div class="productsContainer row">


@for(product of products; track product.pPrice){
  <div class="col-lg-3 col-sm-6 col-md-4">
    <div class="product">
        <img [src]="product.pImage" class="pImage" [alt]="product.pTitle">
        <h3 class="pTitle">{{ product.pTitle }}</h3>
        <p class="pDescription">{{ product.pDescription }}</p>
        <div class="pPrice">${{ product.pPrice }}</div>
    </div>
  </div>
}

</div>
